name: Selenium Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cài Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cài Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Chạy Selenium Tests
        working-directory: demo   # ✅ thêm dòng này
        run: mvn clean test -Dbrowser=chrome -Denv=dev -Dsurefire.suiteXmlFiles=testng.xml
        env:
          APP_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}

      - name: Lưu kết quả test
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            demo/target/surefire-reports/   # ✅ sửa path
            demo/target/screenshots/        # ✅ sửa path
          retention-days: 30