name: Full Selenium CI Pipeline

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        browser: [chrome, firefox]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Start Selenium Grid
        working-directory: demo
        run: docker compose up -d --remove-orphans

      - name: Wait for Selenium Grid
        run: |
          for i in {1..72}; do
            if curl -sf http://localhost:4444/status | grep -q '"ready":true'; then
              echo "Selenium Grid is ready"
              exit 0
            fi
            echo "Waiting for Selenium Grid..."
            docker compose -f demo/docker-compose.yml ps
            sleep 5
          done
          echo "Selenium Grid did not become ready in time"
          docker compose -f demo/docker-compose.yml logs --no-color --tail 200
          docker compose -f demo/docker-compose.yml ps
          exit 1

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Chay test
        run: mvn -f demo/pom.xml clean test -Dbrowser=${{ matrix.browser }} -Dgrid.url=http://localhost:4444
        env:
          APP_USERNAME: ${{ secrets.SAUCEDEMO_USERNAME }}
          APP_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: demo/target/allure-results/

  publish-report:
    needs: test
    if: always()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all browser results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results
          merge-multiple: true

      - name: Tao Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history